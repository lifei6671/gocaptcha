<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>gocaptcha 参数演示</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f7fb;
            color: #1e293b;
        }
        .wrap {
            max-width: 760px;
            margin: 32px auto;
            padding: 24px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.08);
        }
        h1 {
            margin: 0 0 12px;
            font-size: 24px;
        }
        .desc {
            margin: 0 0 20px;
            color: #475569;
            line-height: 1.6;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        select, button {
            font-size: 14px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            background: #fff;
        }
        button {
            cursor: pointer;
        }
        img {
            display: block;
            width: 360px;
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #f8fafc;
            margin: 16px 0;
        }
        .preset-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preset-links a {
            text-decoration: none;
            font-size: 13px;
            color: #1d4ed8;
            padding: 4px 8px;
            border-radius: 999px;
            background: #eff6ff;
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>验证码参数组合演示</h1>
    <p class="desc">{{ .CurrentPreset.Description }}</p>

    <form class="controls" method="get" action="/">
        <label for="preset">版本：</label>
        <select id="preset" name="preset" onchange="this.form.submit()">
            {{ range .Presets }}
            <option value="{{ .ID }}" {{ if eq $.SelectedPreset .ID }}selected{{ end }}>{{ .Name }}</option>
            {{ end }}
        </select>
        <noscript><button type="submit">切换</button></noscript>
        <button type="button" onclick="refreshCaptcha()">刷新同配置</button>
    </form>

    <img id="captcha" src="/get/?preset={{ .SelectedPreset }}&t={{ .NowUnixNano }}" alt="captcha">

    <div class="preset-links">
        {{ range .Presets }}
        <a href="/?preset={{ .ID }}">{{ .Name }}</a>
        {{ end }}
    </div>
</div>

<script>
    function refreshCaptcha() {
        const image = document.getElementById("captcha");
        image.src = "/get/?preset={{ .SelectedPreset }}&t=" + Date.now();
    }
</script>
</body>
</html>
